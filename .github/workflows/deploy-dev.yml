name: Questly CI/CD dev

on:
  push:
    branches: [ "main" ]

jobs:
  # Job для сборки и анализа кода
  build-and-analyze:
    runs-on: ubuntu-latest
    environment: env
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 📦 Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./.sonar/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      - name: 🧰 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: 🧪 Start SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./.sonar/scanner/dotnet-sonarscanner begin \
            /k:"ShdwKick_Questly" \
            /o:"burninghouse" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.dotcover.reportsPaths="**/coverage.opencover.xml"
      
      - name: 🔨 Build and analyze project
        run: |
          dotnet restore ${{ vars.SOLUTION_NAME }}
          dotnet build ${{ vars.SOLUTION_NAME }} --configuration Debug --no-restore
      
      - name: 🧪 Finish SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./.sonar/scanner/dotnet-sonarscanner end \
            /d:sonar.token="$SONAR_TOKEN"

  # Job для сборки и публикации Docker образов
  build-and-push:
    runs-on: ubuntu-latest
    environment: env
    needs: build-and-analyze
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: 🛠 Build Questly image
        run: docker build -t ${{ vars.QUESTLY_IMAGE }} -f Questly/Dockerfile .
          
      - name: 🚀 Push Questly image
        run: docker push ${{ vars.QUESTLY_IMAGE }}:latest

  # Job для деплоя на сервер
  deploy:
    runs-on: ubuntu-latest
    environment: env
    needs: build-and-push
    steps:
      - name: 🧬 Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/QuestlyCompose
            
            # Создаем структуру каталогов для PostgreSQL 18+
            mkdir -p /root/QuestlyCompose/pgdata/18/docker
            chown -R 999:999 /root/QuestlyCompose/pgdata
            
            # Генерируем файл .env
            cat > .env <<EOF
            POSTGRES_USER=${{ vars.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ vars.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ vars.POSTGRES_DB }}
            SERVER_KEY=${{ vars.SERVER_KEY }}
            HASH_SALT=${{ vars.HASH_SALT }}
            ISSUER=${{ vars.ISSUER }}
            AUDIENCE=${{ vars.AUDIENCE }}
            CONNECTION_STRING=${{ vars.CONNECTION_STRING }}
            RABBITMQ_USERNAME=${{ vars.RABBITMQ_USERNAME }}
            RABBITMQ_PASSWORD=${{ vars.RABBITMQ_PASSWORD }}
            RABBITMQ_HOSTNAME=${{ vars.RABBITMQ_HOSTNAME }}
            EOF
            
            # Останавливаем текущие контейнеры
            docker compose down --remove-orphans || true
            
            # Обновляем образы с Docker Hub
            echo "=== Обновление образов с Docker Hub ==="
            docker compose pull
            
            # Запускаем контейнеры
            echo "=== Запуск контейнеров ==="
            docker compose up -d --build
            
            # Проверяем статус контейнеров
            echo "=== Проверка статуса контейнеров ==="
            docker ps -a
            
            # Проверяем, что приложение запущено
            if ! docker inspect questly-app &> /dev/null || [ "$(docker inspect questly-app --format='{{.State.Status}}')" != "running" ]; then
              echo "❌ ОШИБКА: Приложение questly-app не запущено"
              docker logs questly-app || echo "Логи недоступны"
              exit 1
            fi
            
            echo "✅ Все сервисы успешно запущены!"
